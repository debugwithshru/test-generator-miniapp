<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generate Test</title>
    <!-- Telegram Web App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header>
            <img src="./logo.webp" alt="Classes Logo" class="logo">
            <h1>Test Generator</h1>
            <p>Fill the details below to generate your test.</p>
        </header>

        <form id="testForm" class="test-form">
            <div class="form-group">
                <label>Grade (Select multiple) <span class="required-asterisk">*</span></label>
                <div class="radio-group" id="gradeGroup">
                    <label>
                        <input type="checkbox" name="studentGrade" value="8">
                        <span>8</span>
                    </label>
                    <label>
                        <input type="checkbox" name="studentGrade" value="9">
                        <span>9</span>
                    </label>
                    <label>
                        <input type="checkbox" name="studentGrade" value="10">
                        <span>10</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Target Audience <span class="required-asterisk">*</span></label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="targetAudience" value="all" checked>
                        <span>All Students</span>
                    </label>
                    <label>
                        <input type="radio" name="targetAudience" value="specific">
                        <span>Specific Student</span>
                    </label>
                </div>
            </div>

            <div class="form-group error-container" id="studentIdGroup" style="display: none;">
                <label>Select Roll No.s <span class="required-asterisk">*</span></label>
                <div class="search-container">
                    <input type="text" id="rollNoSearch" placeholder="Search Roll No...">
                </div>
                <div id="rollNoList" class="rollno-list">
                    <!-- Checkboxes will be injected here via script.js -->
                </div>
            </div>

            <div class="form-group">
                <label>Select Concepts <span class="required-asterisk">*</span></label>
                <div id="taxonomyContainer" class="taxonomy-container">
                    <!-- Dynamic check lists will be injected here via scripts.js -->
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Generate Test</button>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            Submission successful! Please wait for 2 minutes.
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
